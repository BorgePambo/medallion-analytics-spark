services:

  # MinIO
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - spark-net

  # Postgres
  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - spark-net

  # Spark Master
  spark-master:
    image: custom-spark:3.5.1
    container_name: spark-master
    hostname: spark-master
    command: >
      bash -c "
      /opt/spark/sbin/start-master.sh &&
      tail -f /opt/spark/logs/spark--org.apache.spark.deploy.master*.out
      "
    ports:
      - "8080:8080"  # Master UI
      - "7077:7077"  # Spark Master port
    volumes:
      - ./app:/opt/spark/spark-app
      - ./data:/opt/spark/spark-data
      - ./notebooks:/opt/spark/notebooks
    networks:
      - spark-net

  # Spark Worker 1
  spark-worker-1:
    image: custom-spark:3.5.1
    container_name: spark-worker-1
    hostname: spark-worker-1
    command: >
      bash -c "
      /opt/spark/sbin/start-worker.sh spark://spark-master:7077 --cores 2 --memory 2g &&
      tail -f /opt/spark/logs/spark--org.apache.spark.deploy.worker*.out
      "
    ports:
      - "8081:8081"  # Worker 1 UI
    depends_on:
      - spark-master
    volumes:
      - ./app:/opt/spark/spark-app
      - ./data:/opt/spark/spark-data
      - ./notebooks:/opt/spark/notebooks
    networks:
      - spark-net

  # Spark Worker 2
  spark-worker-2:
    image: custom-spark:3.5.1
    container_name: spark-worker-2
    hostname: spark-worker-2
    command: >
      bash -c "
      /opt/spark/sbin/start-worker.sh spark://spark-master:7077 --cores 2 --memory 2g &&
      tail -f /opt/spark/logs/spark--org.apache.spark.deploy.worker*.out
      "
    ports:
      - "8082:8081"  # Worker 2 UI
    depends_on:
      - spark-master
    volumes:
      - ./app:/opt/spark/spark-app
      - ./data:/opt/spark/spark-data
      - ./notebooks:/opt/spark/notebooks
    networks:
      - spark-net

# Rede bridge para o Spark
networks:
  spark-net:
    driver: bridge

# Volumes
volumes:
  minio_data:
  pgdata:
